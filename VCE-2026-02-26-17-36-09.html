<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google UI Clone</title>

<style>
body {
    height: 100vh;
    margin: 0;
    background: linear-gradient(360deg, white, rgb(2, 2, 67));
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
}

.left a, .right a {
    color: aliceblue;
    margin-left: 15px;
    text-decoration: none;
    font-size: large;
}

/* Logo */
.logo {
    text-align: center;
    font-size: 80px;
    font-weight: bold;
    margin-top: 50px;
    background: linear-gradient(0deg, white, rgb(152, 149, 183));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Search Bar */
.search-bar-main {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.search-bar {
    height: 45px;
    width: 600px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: white;
    padding: 0 15px;
}

.plus {
    font-size: 25px;
}

.s-right {
    display: flex;
    gap: 10px;
}

/* Footer buttons */
.pp {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.dt1, .dt2 {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<nav class="navbar">
    <div class="left">
        <a href="#">About</a>
        <a href="#">Store</a>
    </div>

    <div class="right">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
    </div>
</nav>

<div class="logo">Google</div>

<div class="search-bar-main">
    <div class="search-bar">
        <div class="plus">+</div>

        <div class="s-right">
            <div class="mic">🎤</div>
            <div class="music">🎵</div>
            <button class="ai">AI Mode</button>
        </div>
    </div>
</div>

<div class="pp">
    <button class="dt1">Made By Karthik</button>
    <button class="dt2">On 28-04-2026</button>
</div>

</body>
</html>
